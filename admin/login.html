<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Cliente - BlueBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .input-field:focus { border-color: #3b82f6; outline: none; ring: 2px; ring-color: #3b82f6/20; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-md" x-data="clientLogin()">
        <!-- Logo/Header -->
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-600/20">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Portal do Cliente</h1>
            <p class="text-slate-400 mt-1 text-sm">Gerencie seu robô BlueBot</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-3xl p-8 space-y-6 shadow-2xl">
            <form @submit.prevent="handleLogin" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Chave da Licença</label>
                    <input type="text" x-model="key" placeholder="APRO-XXXX-XXXX-XXXX" required
                           class="w-full px-4 py-3 rounded-xl input-field text-sm tracking-wider font-mono">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Senha de Acesso</label>
                    <input type="password" x-model="password" placeholder="••••••••" required
                           class="w-full px-4 py-3 rounded-xl input-field text-sm">
                </div>

                <template x-if="error">
                    <div class="p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-center">
                        <p class="text-red-400 text-xs font-medium" x-text="error"></p>
                    </div>
                </template>

                <button type="submit" :disabled="loading"
                        class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-blue-800 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2">
                    <span x-show="!loading">Entrar no Painel</span>
                    <div x-show="loading" class="w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                </button>
            </form>
        </div>

        <p class="text-center text-slate-500 text-xs mt-8">
            BlueBot &copy; 2026 - Todos os direitos reservados.
        </p>
    </div>

    <script>
        function clientLogin() {
            return {
                key: '',
                password: '',
                error: null,
                loading: false,
                async handleLogin() {
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        const res = await fetch('/admin/client/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                license_key: this.key.trim(),
                                password: this.password.trim()
                            })
                        });

                        const data = await res.json();

                        if (!res.ok) {
                            throw new Error(data.detail || 'Falha na autenticação');
                        }

                        // Login bem-sucedido - Salva a chave e redireciona
                        // Em um sistema real usaríamos JWT, aqui redirecionamos para o view com a chave
                        window.location.href = `view.html?key=${encodeURIComponent(this.key.trim())}`;
                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
