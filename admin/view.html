<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Robô - BlueBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-8" x-data="clientView()">
    
    <div class="max-w-4xl mx-auto space-y-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Meu BlueBot</h1>
                <p class="text-slate-400 mt-1">Status e monitoramento em tempo real</p>
            </div>
            <div class="flex items-center gap-3">
                <template x-if="license">
                    <div class="px-4 py-2 glass rounded-2xl flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full" :class="license.active ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'"></span>
                        <span class="text-sm font-semibold" x-text="license.active ? 'Licença Ativa' : 'Inativa'"></span>
                    </div>
                </template>
            </div>
        </div>

        <template x-if="!license && !error">
            <div class="flex flex-col items-center justify-center py-20">
                <div class="w-12 h-12 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400">Carregando dados do robô...</p>
            </div>
        </template>

        <template x-if="error">
            <div class="p-6 bg-red-500/10 border border-red-500/20 rounded-3xl text-center">
                <p class="text-red-400 font-medium" x-text="error"></p>
            </div>
        </template>

        <template x-if="license">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- WhatsApp Status Card -->
                <div class="md:col-span-2 glass rounded-3xl p-8 space-y-6">
                    <div class="flex items-center justify-between">
                        <h2 class="text-xl font-bold text-white">Conexão WhatsApp</h2>
                        <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider"
                              :class="{
                                'bg-emerald-500/20 text-emerald-400': license.whatsapp_status === 'connected',
                                'bg-blue-500/20 text-blue-400': license.whatsapp_status === 'qr',
                                'bg-slate-500/20 text-slate-400': !license.whatsapp_status || license.whatsapp_status === 'disconnected'
                              }"
                              x-text="license.whatsapp_status || 'Offline'"></span>
                    </div>

                    <div class="flex flex-col items-center justify-center py-6">
                        <!-- QR Code Section -->
                        <template x-if="license.whatsapp_status === 'qr' && license.whatsapp_qr">
                            <div class="text-center space-y-4">
                                <div class="bg-white p-4 rounded-2xl inline-block shadow-2xl ring-8 ring-slate-800">
                                    <img :src="license.whatsapp_qr" class="w-64 h-64 mx-auto">
                                </div>
                                <p class="text-sm text-slate-400">Escaneie o código acima com seu WhatsApp</p>
                            </div>
                        </template>

                        <!-- Connected Section -->
                        <template x-if="license.whatsapp_status === 'connected'">
                            <div class="text-center space-y-4">
                                <div class="w-24 h-24 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto shadow-[0_0_50px_rgba(16,185,129,0.2)]">
                                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                </div>
                                <h3 class="text-xl font-bold text-white">WhatsApp Online!</h3>
                                <p class="text-slate-400">Seu robô está pronto para disparar ofertas.</p>
                            </div>
                        </template>

                        <!-- Disconnected Section -->
                        <template x-if="!license.whatsapp_status || license.whatsapp_status === 'disconnected'">
                            <div class="text-center space-y-4">
                                <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto">
                                    <svg class="w-10 h-10 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
                                </div>
                                <p class="text-slate-400">Aguardando o robô iniciar o WhatsApp...</p>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Info Sidebar -->
                <div class="space-y-6">
                    <div class="glass rounded-3xl p-6 space-y-4">
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Informações</h3>
                        <div>
                            <p class="text-xs text-slate-500">Último Sinal (Heartbeat)</p>
                            <p class="text-white font-medium" x-text="formatDate(license.last_heartbeat)"></p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500">Validade da Licença</p>
                            <p class="text-white font-medium" x-text="formatDate(license.expires_at)"></p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500">ID da Máquina</p>
                            <p class="text-xs text-slate-400 truncate" x-text="license.machine_id"></p>
                        </div>
                    </div>

                    <div class="glass rounded-3xl p-6">
                        <p class="text-xs text-slate-400 leading-relaxed italic">
                            "Este painel permite que você monitore seu robô remotamente de qualquer lugar."
                        </p>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
        function clientView() {
            return {
                license: null,
                error: null,
                async init() {
                    // Pega a chave da URL (ex: /view.html?key=ABC)
                    const urlParams = new URLSearchParams(window.location.search);
                    const key = urlParams.get('key');
                    
                    if (!key) {
                        this.error = "Chave de licença não fornecida na URL.";
                        return;
                    }

                    this.fetchStatus(key);
                    setInterval(() => this.fetchStatus(key), 5000);
                },
                async fetchStatus(key) {
                    try {
                        const res = await fetch(`/admin/license/public/${key}`);
                        if (!res.ok) throw new Error("Chave inválida ou robô offline.");
                        this.license = await res.json();
                        this.error = null;
                    } catch (e) {
                        this.error = e.message;
                    }
                },
                formatDate(dateStr) {
                    if (!dateStr) return 'Nunca';
                    const d = new Date(dateStr);
                    return d.toLocaleString('pt-BR');
                }
            }
        }
    </script>
</body>
</html>
