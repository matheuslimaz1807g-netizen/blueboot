<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BlueBot - Painel de controle do cliente para gerenciamento do robô de envios.">
    <title>BlueBot - Painel do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0f1e;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Surfaces */
        .surface {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 10px;
        }
        .surface-muted {
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid #1f2937;
            border-radius: 8px;
        }

        /* Brand */
        .brand-bg { background: #4f46e5; }

        /* Inputs */
        .field {
            width: 100%;
            background: #0a0f1e;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            color: #f1f5f9;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* Buttons */
        .btn-primary {
            background: #4f46e5;
            color: #fff;
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }
        .btn-primary:hover:not(:disabled) { background: #4338ca; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-danger {
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
            font-weight: 600;
            font-size: 0.8125rem;
            padding: 0.5rem 0.875rem;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-danger:hover:not(:disabled) { background: rgba(239, 68, 68, 0.2); }
        .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-success {
            background: rgba(16, 185, 129, 0.12);
            color: #6ee7b7;
            font-weight: 600;
            font-size: 0.8125rem;
            padding: 0.5rem 0.875rem;
            border-radius: 8px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-success:hover:not(:disabled) { background: rgba(16, 185, 129, 0.2); }
        .btn-success:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Status dot */
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.active {
            background: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            animation: pulse-dot 2s infinite;
        }
        .status-dot.inactive { background: #4b5563; }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
            50%       { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.05); }
        }

        /* Log badge */
        .log-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Scrollbar */
        .scroll-area { scrollbar-width: thin; scrollbar-color: #1f2937 transparent; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-track { background: transparent; }
        .scroll-area::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

        /* Section separator */
        .section-divider {
            border: none;
            border-top: 1px solid #1f2937;
            margin: 1rem 0;
        }

        /* Checkbox custom */
        .toggle-group { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .toggle-group input[type="checkbox"] {
            accent-color: #4f46e5;
            width: 15px; height: 15px;
            cursor: pointer;
        }

        /* Loading spinner */
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Fade-in animation */
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="clientApp()" x-init="init()">

    <!-- Toast notification -->
    <div
        x-show="toast.show"
        x-cloak
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed top-5 right-5 z-50 px-4 py-3 rounded-lg shadow-xl text-sm font-medium max-w-sm"
        :class="toast.type === 'success' ? 'bg-emerald-700 text-emerald-100' : 'bg-rose-700 text-rose-100'"
        x-text="toast.msg"
    ></div>

    <!-- LOGIN -->
    <template x-if="!loggedIn">
        <div class="min-h-screen flex items-center justify-center p-6" style="background: radial-gradient(ellipse at 50% 0%, rgba(79,70,229,0.08) 0%, transparent 70%), #0a0f1e;">
            <div class="w-full max-w-[400px] surface p-8 space-y-6 fade-in">
                <div>
                    <div class="w-10 h-10 brand-bg rounded-lg flex items-center justify-center mb-5">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <h1 class="text-xl font-semibold text-white tracking-tight">BlueBot</h1>
                    <p class="text-slate-400 text-sm mt-1">Acesse sua licença para continuar.</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Chave de Licença</label>
                        <input
                            id="login-key"
                            type="text"
                            x-model="loginForm.license_key"
                            placeholder="APRO-XXXX-XXXX"
                            @keydown.enter="doLogin()"
                            class="field"
                        >
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Senha</label>
                        <input
                            id="login-password"
                            type="password"
                            x-model="loginForm.password"
                            placeholder="••••••••"
                            @keydown.enter="doLogin()"
                            class="field"
                        >
                    </div>
                    <button id="btn-login" @click="doLogin()" :disabled="loading" class="btn-primary w-full py-2.5 flex items-center justify-center gap-2">
                        <span class="spinner" x-show="loading"></span>
                        <span x-text="loading ? 'Autenticando...' : 'Entrar no Painel'"></span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- DASHBOARD -->
    <template x-if="loggedIn">
        <div class="min-h-screen flex flex-col fade-in">

            <!-- Header -->
            <header class="sticky top-0 z-30 border-b border-gray-800/80 px-6 lg:px-8 py-3 flex items-center justify-between" style="background: rgba(10,15,30,0.92); backdrop-filter: blur(12px);">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 brand-bg rounded-lg flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div class="min-w-0">
                        <p class="font-semibold text-white text-sm leading-none truncate" x-text="license?.note || 'Meu Robo'"></p>
                        <span class="text-[10px] text-indigo-400 font-mono" x-text="license?.key"></span>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Bot status indicator -->
                    <div class="hidden sm:flex items-center gap-2">
                        <span class="status-dot" :class="config.bot_enabled ? 'active' : 'inactive'"></span>
                        <span class="text-xs text-slate-400" x-text="config.bot_enabled ? 'Bot ativo' : 'Bot parado'"></span>
                    </div>

                    <div class="hidden md:flex flex-col items-end">
                        <span class="text-[10px] text-slate-500 uppercase tracking-wide">Plano</span>
                        <span class="text-xs font-semibold text-indigo-300 uppercase" x-text="license?.plan"></span>
                    </div>

                    <button id="btn-logout" @click="logout()" class="p-1.5 hover:bg-gray-800 rounded-lg text-slate-400 hover:text-slate-200 transition-colors" title="Sair">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </header>

            <main class="flex-1 p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto w-full space-y-6">

                <!-- Status cards row -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

                    <!-- WhatsApp -->
                    <div class="surface p-4 flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0"
                             :class="license?.whatsapp_status === 'connected' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                            </svg>
                        </div>
                        <div class="min-w-0">
                            <p class="text-xs text-slate-500">WhatsApp</p>
                            <p class="text-sm font-semibold text-white" x-text="license?.whatsapp_status === 'connected' ? 'Conectado' : 'Aguardando'"></p>
                        </div>
                    </div>

                    <!-- Last signal -->
                    <div class="surface p-4 flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 bg-indigo-500/10 text-indigo-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 20.25h.008v.008H12v-.008z"/>
                            </svg>
                        </div>
                        <div class="min-w-0">
                            <p class="text-xs text-slate-500">Ultimo Sinal</p>
                            <p class="text-sm font-semibold text-white" x-text="fmtRelative(license?.last_heartbeat) || 'Sem sinal'"></p>
                        </div>
                    </div>

                    <!-- Expiration -->
                    <div class="surface p-4 flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 bg-purple-500/10 text-purple-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="min-w-0">
                            <p class="text-xs text-slate-500">Expiracao</p>
                            <p class="text-sm font-semibold text-white" x-text="fmtDate(license?.expires_at) || 'Vitalicio'"></p>
                        </div>
                    </div>

                    <!-- Bot control -->
                    <div class="surface p-4 flex items-center justify-between gap-3">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 transition-colors"
                                 :class="config.bot_enabled ? 'bg-emerald-500/10 text-emerald-400' : 'bg-gray-700/50 text-slate-500'">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path x-show="!config.bot_enabled" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/>
                                    <path x-show="config.bot_enabled" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 5.25v13.5m-7.5-13.5v13.5"/>
                                </svg>
                            </div>
                            <div class="min-w-0">
                                <p class="text-xs text-slate-500">Controle</p>
                                <p class="text-sm font-semibold text-white" x-text="config.bot_enabled ? 'Ativo' : 'Parado'"></p>
                            </div>
                        </div>
                        <button
                            id="btn-toggle-bot"
                            @click="toggleBot()"
                            :disabled="botToggling"
                            class="flex-shrink-0 flex items-center gap-1.5"
                            :class="config.bot_enabled ? 'btn-danger' : 'btn-success'"
                        >
                            <span class="spinner" x-show="botToggling" style="border-top-color: currentColor; width:12px; height:12px;"></span>
                            <span x-text="botToggling ? 'Aguarde...' : (config.bot_enabled ? 'Parar Bot' : 'Iniciar Bot')"></span>
                        </button>
                    </div>

                </div>

                <!-- Main grid: Config | Queue + Logs -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                    <!-- Config section -->
                    <section class="surface p-6 space-y-5">
                        <div class="flex items-center justify-between">
                            <h2 class="text-sm font-semibold flex items-center gap-2 text-white">
                                <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                                Configuracoes
                            </h2>
                            <button id="btn-save-config" @click="saveConfig()" :disabled="loading" class="btn-primary">
                                <span class="spinner" x-show="loading" style="width:12px;height:12px;"></span>
                                <span x-show="!loading">Salvar</span>
                                <span x-show="loading">Salvando...</span>
                            </button>
                        </div>

                        <div class="space-y-4 max-h-[600px] overflow-y-auto scroll-area pr-1">

                            <!-- Telegram credentials -->
                            <div>
                                <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest mb-2">Telegram</p>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-xs text-slate-400 mb-1">API ID</label>
                                        <input type="text" x-model="config.api_id" placeholder="123456" class="field">
                                    </div>
                                    <div>
                                        <label class="block text-xs text-slate-400 mb-1">API Hash</label>
                                        <input type="password" x-model="config.api_hash" placeholder="Hash secreto" class="field">
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Telefone</label>
                                <input type="text" x-model="config.phone" placeholder="+5511999999999" class="field">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Destino (Canal/Grupo)</label>
                                <input type="text" x-model="config.destination_telegram" class="field">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Fontes Monitoradas (separadas por virgula)</label>
                                <input type="text" x-model="config.sources_str" class="field">
                            </div>

                            <hr class="section-divider">

                            <!-- WhatsApp -->
                            <div>
                                <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest mb-2">WhatsApp</p>
                                <div class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-slate-400 mb-1">Canais de Destino (separados por virgula)</label>
                                        <input type="text" x-model="config.wpp_channels_str" placeholder="Canal Promo 1, Ofertas 24h" class="field">
                                    </div>
                                    <div>
                                        <label class="block text-xs text-slate-400 mb-1">Grupos de Destino (separados por virgula)</label>
                                        <input type="text" x-model="config.wpp_groups_str" placeholder="Grupo Promo 1, Amigos" class="field">
                                    </div>
                                </div>
                            </div>

                            <hr class="section-divider">

                            <!-- Affiliate credentials -->
                            <div>
                                <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest mb-2">Credenciais de Afiliado</p>
                                <div class="space-y-3">
                                    <div class="grid grid-cols-2 gap-3">
                                        <div>
                                            <label class="block text-xs text-slate-400 mb-1">Shopee APPID:SECRET</label>
                                            <input type="password" x-model="config.shopee_token" placeholder="APPID:SECRET" class="field">
                                        </div>
                                        <div>
                                            <label class="block text-xs text-slate-400 mb-1">Mercado Livre Token</label>
                                            <input type="password" x-model="config.ml_token" class="field">
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-3">
                                        <div>
                                            <label class="block text-xs text-slate-400 mb-1">AliExpress App Key</label>
                                            <input type="password" x-model="config.ali_key" class="field">
                                        </div>
                                        <div>
                                            <label class="block text-xs text-slate-400 mb-1">AliExpress Secret</label>
                                            <input type="password" x-model="config.ali_secret" class="field">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs text-slate-400 mb-1">AliExpress Tracking ID</label>
                                        <input type="text" x-model="config.ali_tracking" class="field">
                                    </div>
                                    <div>
                                        <label class="block text-xs text-slate-400 mb-1">ML Cookies</label>
                                        <textarea x-model="config.ml_cookies" rows="2" class="field" style="resize:vertical;"></textarea>
                                    </div>
                                </div>
                            </div>

                            <hr class="section-divider">

                            <!-- Advanced -->
                            <div>
                                <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest mb-2">Avancado</p>
                                <div class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-slate-400 mb-1">Intervalo entre envios (minutos)</label>
                                        <input
                                            type="number"
                                            min="0.1"
                                            step="any"
                                            :value="(config.delay_segundos || 60) / 60"
                                            @input="config.delay_segundos = Math.max(1, Math.round(parseFloat($event.target.value || 0) * 60))"
                                            class="field"
                                            style="max-width:140px;"
                                        >
                                    </div>
                                    <div class="grid grid-cols-2 gap-x-6 gap-y-2.5">
                                        <label class="toggle-group">
                                            <input type="checkbox" x-model="config.send_telegram">
                                            <span class="text-sm text-slate-300">Enviar p/ Telegram</span>
                                        </label>
                                        <label class="toggle-group">
                                            <input type="checkbox" x-model="config.send_whatsapp">
                                            <span class="text-sm text-slate-300">Enviar p/ WhatsApp</span>
                                        </label>
                                        <label class="toggle-group">
                                            <input type="checkbox" x-model="config.conv_shopee">
                                            <span class="text-sm text-slate-300">Converter Shopee</span>
                                        </label>
                                        <label class="toggle-group">
                                            <input type="checkbox" x-model="config.conv_ali">
                                            <span class="text-sm text-slate-300">Converter AliExpress</span>
                                        </label>
                                        <label class="toggle-group">
                                            <input type="checkbox" x-model="config.conv_ml">
                                            <span class="text-sm text-slate-300">Converter Mercado Livre</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </section>

                    <!-- Right column -->
                    <div class="flex flex-col gap-6">

                        <!-- Queue -->
                        <section class="surface p-6">
                            <h2 class="text-sm font-semibold mb-4 flex items-center gap-2 text-white">
                                <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/>
                                </svg>
                                Fila de Envio
                                <span class="ml-auto text-xs text-slate-500 font-normal" x-text="(license?.queue_items?.length || 0) + ' item(ns)'"></span>
                            </h2>
                            <div class="overflow-y-auto scroll-area space-y-2 max-h-44">
                                <template x-if="!license?.queue_items || license.queue_items.length === 0">
                                    <div class="surface-muted p-4 text-center text-slate-500 text-xs">
                                        Nenhum item na fila
                                    </div>
                                </template>
                                <template x-for="(item, idx) in (license?.queue_items || [])" :key="idx">
                                    <div class="surface-muted px-3 py-2.5 flex items-center justify-between gap-3">
                                        <p class="text-xs text-slate-300 truncate flex-1" x-text="item.preview"></p>
                                        <span class="text-xs text-indigo-400 font-mono font-semibold flex-shrink-0" x-text="item.eta"></span>
                                    </div>
                                </template>
                            </div>
                        </section>

                        <!-- Logs -->
                        <section class="surface p-6 flex flex-col flex-1">
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-sm font-semibold flex items-center gap-2 text-white">
                                    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                                    </svg>
                                    Logs de Atividade
                                </h2>
                                <span class="text-[10px] text-slate-600 font-mono">atualiza a cada 30s</span>
                            </div>
                            <div class="overflow-y-auto scroll-area space-y-2 flex-1 max-h-96">
                                <template x-if="logs.length === 0">
                                    <div class="surface-muted p-4 text-center text-slate-500 text-xs">
                                        Nenhuma atividade registrada
                                    </div>
                                </template>
                                <template x-for="log in logs" :key="log.id">
                                    <div class="surface-muted px-3 py-2.5">
                                        <div class="flex items-center justify-between mb-1.5 gap-2">
                                            <span
                                                class="log-badge"
                                                :class="logBadgeClass(log.nivel)"
                                                x-text="formatLevel(log.nivel)"
                                            ></span>
                                            <span class="text-[10px] text-slate-600 font-mono flex-shrink-0" x-text="fmtTime(log.created_at)"></span>
                                        </div>
                                        <p class="text-xs text-slate-300 leading-relaxed break-words" x-text="sanitizeLog(log.mensagem)"></p>
                                    </div>
                                </template>
                            </div>
                        </section>

                    </div>
                </div>
            </main>
        </div>
    </template>

<script>
    function clientApp() {
        return {
            loggedIn:    false,
            loading:     false,
            botToggling: false,
            license:     null,
            config:      {},
            logs:        [],
            loginForm:   { license_key: '', password: '' },
            toast:       { show: false, msg: '', type: 'success' },
            apiBase:     'https://api.bluebotapp.com.br',

            // ── Lifecycle ────────────────────────────────────────────────────

            async init() {
                const token = localStorage.getItem('client_token');
                if (!token) return;
                this.loggedIn = true;
                await this.loadAll();
                setInterval(() => this.loadAll(), 30000);
            },

            // ── Auth ─────────────────────────────────────────────────────────

            async doLogin() {
                this.loading = true;
                try {
                    const r = await fetch(`${this.apiBase}/auth/login/client`, {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body:    JSON.stringify(this.loginForm),
                    });
                    const d = await this._parseResponse(r);

                    if (r.ok) {
                        localStorage.setItem('client_token', d.access_token);
                        this.loggedIn = true;
                        this.showToast('Bem-vindo!', 'success');
                        await this.loadAll();
                        setInterval(() => this.loadAll(), 30000);
                    } else {
                        this.showToast(d.detail || 'Falha no login', 'error');
                    }
                } catch (e) {
                    this.showToast('Erro de conexao: ' + e.message, 'error');
                } finally {
                    this.loading = false;
                }
            },

            logout() {
                localStorage.removeItem('client_token');
                this.loggedIn = false;
                this.license  = null;
                this.logs     = [];
                this.config   = {};
            },

            // ── Data loading ─────────────────────────────────────────────────

            async loadAll() {
                await Promise.all([this.loadMe(), this.loadConfig(), this.loadLogs()]);
            },

            async loadMe() {
                const data = await this.fetchApi('/client/me');
                if (data) this.license = data;
            },

            async loadConfig() {
                const cfg = await this.fetchApi('/client/config');
                if (!cfg) return;

                const channels = [];
                const groups   = [];

                for (const dest of (cfg.wpp_destinations || [])) {
                    if (dest.startsWith('group:'))        groups.push(dest.replace('group:', ''));
                    else if (dest.startsWith('channel:')) channels.push(dest.replace('channel:', ''));
                    else                                   channels.push(dest);
                }

                this.config = {
                    ...cfg,
                    bot_enabled:      cfg.bot_enabled !== false,
                    sources_str:      (cfg.sources || []).join(', '),
                    wpp_channels_str: channels.join(', '),
                    wpp_groups_str:   groups.join(', '),
                };
            },

            async loadLogs() {
                const raw = await this.fetchApi('/client/logs');
                if (!Array.isArray(raw)) { this.logs = []; return; }

                const allowed = new Set(['info', 'success', 'warning', 'error']);
                const deduped = new Map();

                for (const log of raw) {
                    if (!allowed.has(log.nivel)) continue;
                    const key = `${log.nivel}:${log.mensagem}`;
                    const existing = deduped.get(key);
                    if (!existing || new Date(log.created_at) > new Date(existing.created_at)) {
                        deduped.set(key, log);
                    }
                }

                this.logs = Array.from(deduped.values())
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            },

            // ── Config & bot control ─────────────────────────────────────────

            async saveConfig() {
                this.loading = true;
                try {
                    const body = { ...this.config };
                    body.sources = (this.config.sources_str || '').split(',').map(s => s.trim()).filter(Boolean);
                    delete body.sources_str;
                    delete body.whatsapp_endpoint;

                    const dests = [];
                    for (const ch of (this.config.wpp_channels_str || '').split(',').map(s => s.trim()).filter(Boolean)) {
                        dests.push('channel:' + ch);
                    }
                    for (const gr of (this.config.wpp_groups_str || '').split(',').map(s => s.trim()).filter(Boolean)) {
                        dests.push('group:' + gr);
                    }
                    body.wpp_destinations = dests;
                    delete body.wpp_channels_str;
                    delete body.wpp_groups_str;

                    const res = await this.fetchApi('/client/config', 'PUT', body);
                    if (res) this.showToast('Configuracoes salvas!', 'success');
                    return !!res;
                } finally {
                    this.loading = false;
                }
            },

            async toggleBot() {
                // Save the current state so we can roll back on failure
                const previousState = this.config.bot_enabled;
                this.config.bot_enabled = !previousState;
                this.botToggling = true;

                try {
                    const ok = await this.saveConfig();
                    if (ok) {
                        // Confirm state from server to stay in sync
                        await this.loadConfig();
                        const action = this.config.bot_enabled ? 'Iniciar Bot' : 'Parar Bot';
                        this.showToast(`${action} solicitado.`, 'success');
                    } else {
                        // Revert optimistic update
                        this.config.bot_enabled = previousState;
                        this.showToast('Falha ao alterar o estado do bot.', 'error');
                    }
                } catch {
                    this.config.bot_enabled = previousState;
                    this.showToast('Erro ao comunicar com o servidor.', 'error');
                } finally {
                    this.botToggling = false;
                }
            },

            // ── API helper ───────────────────────────────────────────────────

            async fetchApi(endpoint, method = 'GET', body = null) {
                try {
                    const headers = {
                        'Authorization': `Bearer ${localStorage.getItem('client_token')}`,
                        'Content-Type':  'application/json',
                    };
                    const options = { method, headers };
                    if (body) options.body = JSON.stringify(body);

                    const r = await fetch(`${this.apiBase}${endpoint}`, options);
                    if (r.status === 401) { this.logout(); return null; }

                    return await this._parseResponse(r);
                } catch (e) {
                    this.showToast('Erro: ' + e.message, 'error');
                    return null;
                }
            },

            async _parseResponse(r) {
                const ct = r.headers.get('content-type') || '';
                return ct.includes('application/json') ? r.json() : r.text().then(t => ({ detail: t || `Erro HTTP ${r.status}` }));
            },

            // ── UI helpers ───────────────────────────────────────────────────

            showToast(msg, type = 'success') {
                this.toast = { show: true, msg, type };
                setTimeout(() => this.toast.show = false, 3500);
            },

            formatLevel(level) {
                const labels = { success: 'OK', error: 'ERRO', warning: 'AVISO', info: 'INFO' };
                return labels[level] || String(level || 'INFO').toUpperCase();
            },

            logBadgeClass(level) {
                const map = {
                    success: 'bg-emerald-500/15 text-emerald-400',
                    error:   'bg-rose-500/15 text-rose-400',
                    warning: 'bg-amber-500/15 text-amber-400',
                    info:    'bg-indigo-500/15 text-indigo-400',
                };
                return map[level] || map.info;
            },

            /**
             * Attempts to fix common UTF-8 mojibake patterns that occur when
             * the bot sends log strings encoded as latin-1 instead of UTF-8.
             * Only handles the most frequent sequences to avoid false positives.
             */
            sanitizeLog(text) {
                if (!text) return '';
                return text
                    .replace(/â€"/g,  '–')
                    .replace(/â€œ/g,  '"')
                    .replace(/â€/g,   '"')
                    .replace(/Ã§/g,   'ç')
                    .replace(/Ã£/g,   'ã')
                    .replace(/Ã¡/g,   'á')
                    .replace(/Ã©/g,   'é')
                    .replace(/Ã­/g,   'í')
                    .replace(/Ã³/g,   'ó')
                    .replace(/Ãº/g,   'ú')
                    .replace(/Ã\u0083/g, 'Ã')
                    .replace(/Ã¢/g,   'â')
                    .replace(/Ãµ/g,   'õ')
                    .replace(/Ã\u00a3/g,'ã')
                    .replace(/PrÃ³ximo/g, 'Proximo')
                    .replace(/nÃ£o/g,  'nao')
                    .replace(/EstÃ¡/g, 'Esta')
                    .replace(/invÃ¡lido/g, 'invalido')
                    .replace(/â[^a-z]/gi, '')  // strip remaining broken sequences
                    .replace(/Ã./g, '');        // strip remaining latin-1 artifacts
            },

            fmtDate(d) {
                if (!d) return '';
                const date = new Date(d);
                if (Number.isNaN(date.getTime())) return '';
                return date.toLocaleDateString('pt-BR');
            },

            fmtRelative(d) {
                if (!d) return '';
                const date = new Date(d);
                if (Number.isNaN(date.getTime())) return '';
                const diff = Math.floor((Date.now() - date.getTime()) / 1000);
                if (diff < 60)   return 'Agora';
                const m = Math.floor(diff / 60);
                if (m < 60)      return `${m} min atras`;
                const h = Math.floor(m / 60);
                if (h < 24)      return `${h}h atras`;
                return this.fmtDate(d);
            },

            fmtTime(ts) {
                const date = new Date(ts);
                if (Number.isNaN(date.getTime())) return '';
                return date.toLocaleString('pt-BR');
            },
        };
    }
</script>
</body>
