<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueBot - Painel do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .panel-surface { background: #1e293b; border: 1px solid #334155; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18); }
        .panel-muted { background: rgba(15, 23, 42, 0.42); border: 1px solid rgba(51, 65, 85, 0.72); }
        .brand-mark { background: #6366f1; }
        .clean-ui-contract { border-radius: 8px; }
    </style>
</head>
<body x-data="clientApp()" x-init="init()">
    
    <!-- Notificações (Toast) -->
    <div x-show="toast.show" x-cloak x-transition class="fixed top-5 right-5 z-50 px-4 py-3 rounded-lg shadow-lg text-sm font-medium"
         :class="toast.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'" x-text="toast.msg"></div>

    <!-- TELA DE LOGIN -->
    <template x-if="!loggedIn">
        <div class="min-h-screen flex items-center justify-center p-6 bg-slate-950 clean-ui-contract">
            <div class="w-full max-w-[420px] panel-surface p-7 rounded-lg space-y-7">
                <div class="text-left">
                    <div class="w-10 h-10 brand-mark rounded-lg flex items-center justify-center mb-5">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                    <h1 class="text-xl font-semibold tracking-tight text-white">BlueBot</h1>
                    <p class="text-slate-400 text-sm mt-1">Acesse sua licenca.</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Chave de Licença</label>
                        <input type="text" x-model="loginForm.license_key" placeholder="APRO-XXXX-XXXX" 
                               class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Senha</label>
                        <input type="password" x-model="loginForm.password" placeholder="••••••••" 
                               class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 outline-none transition">
                    </div>
                    <button @click="doLogin()" :disabled="loading"
                            class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold py-2.5 rounded-lg transition disabled:opacity-50">
                        <span x-text="loading ? 'Autenticando...' : 'Entrar no Painel'"></span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- DASHBOARD DO CLIENTE -->
    <template x-if="loggedIn">
        <div class="min-h-screen flex flex-col">
            <!-- Header -->
            <header class="bg-slate-900/95 border-b border-slate-800 px-6 lg:px-8 py-3 flex items-center justify-between sticky top-0 z-30">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 brand-mark rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                    <div>
                        <h2 class="font-semibold text-white leading-none" x-text="license?.note || 'Meu Robô'"></h2>
                        <span class="text-[10px] text-indigo-400 font-mono" x-text="license?.key"></span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex flex-col items-end">
                        <span class="text-xs text-slate-400">Plano</span>
                        <span class="text-xs font-semibold uppercase text-indigo-300" x-text="license?.plan"></span>
                    </div>
                    <button @click="logout()" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </button>
                </div>
            </header>

            <main class="flex-1 p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto w-full space-y-6">
                <!-- Status Cards -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- WhatsApp Status -->
                    <div class="panel-surface p-5 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center"
                             :class="license?.whatsapp_status === 'connected' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        </div>
                        <div>
                            <p class="text-slate-400 text-sm">Status WhatsApp</p>
                            <p class="text-lg font-semibold text-white" x-text="license?.whatsapp_status === 'connected' ? 'Conectado' : 'Aguardando'"></p>
                        </div>
                    </div>
                    <!-- Robot Signal -->
                    <div class="panel-surface p-5 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-indigo-500/20 text-indigo-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071a9.5 9.5 0 0114.142 0M5.636 5.636a14.5 14.5 0 0120.728 0"/></svg>
                        </div>
                        <div>
                            <p class="text-slate-400 text-sm">Último Sinal</p>
                            <p class="text-lg font-semibold text-white" x-text="fmtRelative(license?.last_heartbeat) || 'Sem sinal'"></p>
                        </div>
                    </div>
                    <!-- Expiration -->
                    <div class="panel-surface p-5 rounded-lg flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-purple-500/20 text-purple-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0"/></svg>
                        </div>
                        <div>
                            <p class="text-slate-400 text-sm">Expiração</p>
                            <p class="text-lg font-semibold text-white" x-text="fmtDate(license?.expires_at) || 'Vitalício'"></p>
                        </div>
                    </div>
                </div>

                <!-- Main Content Grid -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- Config Section -->
                    <section class="panel-surface p-6 rounded-lg space-y-5">
                        <div class="flex items-center justify-between">
                            <h3 class="text-base font-semibold flex items-center gap-2 text-white">
                                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                Configurações
                            </h3>
                            <button @click="saveConfig()" :disabled="loading"
                                    class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold py-2 px-4 rounded-lg transition-colors">
                                Salvar
                            </button>
                        </div>

                        <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Destino Telegram (Canal/Grupo)</label>
                                <input type="text" x-model="config.destination_telegram" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Canais de Destino no WhatsApp (Separados por vírgula)</label>
                                <input type="text" x-model="config.wpp_channels_str" placeholder="Ex: Canal Promo 1, Ofertas 24h" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Grupos de Destino no WhatsApp (Separados por vírgula)</label>
                                <input type="text" x-model="config.wpp_groups_str" placeholder="Ex: Grupo Promo 1, Amigos 24h" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Fontes Monitoradas (Separadas por vírgula)</label>
                                <input type="text" x-model="config.sources_str" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="flex items-center gap-2">
                                    <input type="checkbox" x-model="config.send_telegram" class="rounded border-slate-700 bg-slate-900 text-indigo-600">
                                    <span class="text-sm">Enviar p/ Telegram</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <input type="checkbox" x-model="config.send_whatsapp" class="rounded border-slate-700 bg-slate-900 text-indigo-600">
                                    <span class="text-sm">Enviar p/ WhatsApp</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Right Column (Queue & Logs) -->
                    <div class="space-y-6 flex flex-col h-full">
                        <!-- Queue Section -->
                        <section class="panel-surface p-6 rounded-lg flex flex-col">
                            <h3 class="text-base font-semibold mb-4 flex items-center gap-2 text-white">
                                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                                Fila de Envio
                            </h3>
                            <div class="overflow-y-auto space-y-2 pr-2 font-mono text-xs max-h-[180px]">
                                <template x-if="!license?.queue_items || license.queue_items.length === 0">
                                    <div class="p-4 rounded-lg panel-muted text-center text-slate-500">
                                        Nenhum item aguardando na fila
                                    </div>
                                </template>
                                <template x-for="(item, idx) in (license?.queue_items || [])" :key="idx">
                                    <div class="p-3 rounded-lg panel-muted flex justify-between items-center gap-3">
                                        <div class="flex-1 min-w-0">
                                            <p class="text-slate-300 truncate" x-text="item.preview"></p>
                                        </div>
                                        <div class="text-right shrink-0">
                                            <span class="text-indigo-400 font-semibold" x-text="item.eta"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </section>

                        <!-- Logs Section -->
                        <section class="panel-surface p-6 rounded-lg flex flex-col flex-1">
                            <h3 class="text-base font-semibold mb-5 flex items-center gap-2 text-white">
                                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                Logs de Atividade
                            </h3>
                            <div class="flex-1 overflow-y-auto space-y-3 pr-2 font-mono text-xs max-h-[300px]">
                                <template x-if="logs.length === 0">
                                    <div class="p-4 rounded-lg panel-muted text-center text-slate-500">
                                        Nenhuma atividade registrada
                                    </div>
                                </template>
                                <template x-for="log in logs" :key="log.id">
                                    <div class="p-3 rounded-lg panel-muted">
                                        <div class="flex justify-between mb-1">
                                            <span :class="logLevelClass(log.nivel)" 
                                                  x-text="formatLevel(log.nivel)"></span>
                                            <span class="text-slate-500" x-text="fmtTime(log.created_at)"></span>
                                        </div>
                                        <p class="text-slate-300" x-text="log.mensagem"></p>
                                    </div>
                                </template>
                            </div>
                        </section>
                    </div>
                </div>
            </main>
        </div>
    </template>

<script>
    function clientApp() {
        return {
            loggedIn: false,
            loading: false,
            license: null,
            config: {},
            logs: [],
            loginForm: { license_key: '', password: '' },
            toast: { show: false, msg: '', type: 'success' },
            apiBase: 'https://api.bluebotapp.com.br',

            async init() {
                const token = localStorage.getItem('client_token');
                if (token) {
                    this.loggedIn = true;
                    await this.loadAll();
                    setInterval(() => this.loadAll(), 30000);
                }
            },

            async doLogin() {
                this.loading = true;
                try {
                    const r = await fetch(`${this.apiBase}/auth/login/client`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.loginForm)
                    });
                    
                    let d;
                    const contentType = r.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        d = await r.json();
                    } else {
                        d = { detail: await r.text() || `Erro HTTP ${r.status}` };
                    }

                    if (r.ok) {
                        localStorage.setItem('client_token', d.access_token);
                        this.loggedIn = true;
                        this.showToast('Bem-vindo!', 'success');
                        await this.loadAll();
                    } else {
                        this.showToast(d.detail || 'Falha no login', 'error');
                    }
                } catch (e) {
                    this.showToast('Erro de conexão: ' + e.message, 'error');
                } finally { this.loading = false; }
            },

            async loadAll() {
                await Promise.all([this.loadMe(), this.loadConfig(), this.loadLogs()]);
            },

            async loadMe() {
                this.license = await this.fetchApi('/client/me');
            },

            async loadConfig() {
                const cfg = await this.fetchApi('/client/config');
                if (cfg) {
                    let destinations = cfg.wpp_destinations || [];
                    let channels = [];
                    let groups = [];
                    for (let d of destinations) {
                        if (d.startsWith('group:')) {
                            groups.push(d.replace('group:', ''));
                        } else if (d.startsWith('channel:')) {
                            channels.push(d.replace('channel:', ''));
                        } else {
                            channels.push(d);
                        }
                    }
                    this.config = { 
                        ...cfg, 
                        sources_str: (cfg.sources || []).join(', '),
                        wpp_channels_str: channels.join(', '),
                        wpp_groups_str: groups.join(', ')
                    };
                }
            },

            // ⚡ NOVO loadLogs() otimizado
            async loadLogs() {
                let logs = await this.fetchApi('/client/logs') || [];
                if (!Array.isArray(logs)) {
                    this.logs = [];
                    return;
                }

                // 1. Manter apenas eventos relevantes para o cliente final
                const allowedLevels = ['success', 'error'];
                logs = logs.filter(l => allowedLevels.includes(l.nivel));

                // 2. Remover duplicados (mensagem + nível)
                const map = new Map();
                for (const log of logs) {
                    const key = `${log.nivel}-${log.mensagem}`;

                    if (!map.has(key)) {
                        map.set(key, log);
                    } else {
                        const existing = map.get(key);
                        // Mantém o mais recente
                        if (new Date(log.created_at) > new Date(existing.created_at)) {
                            map.set(key, log);
                        }
                    }
                }

                // 3. Ordenar do mais novo para o mais antigo
                this.logs = Array.from(map.values()).sort(
                    (a, b) => new Date(b.created_at) - new Date(a.created_at)
                );
            },

            async saveConfig() {
                this.loading = true;
                const body = { ...this.config };
                body.sources = this.config.sources_str.split(',').map(s => s.trim()).filter(Boolean);
                delete body.sources_str;

                let wpp_destinations = [];
                if (this.config.wpp_channels_str) {
                    let chs = this.config.wpp_channels_str.split(',').map(s => s.trim()).filter(Boolean);
                    wpp_destinations.push(...chs.map(c => 'channel:' + c));
                }
                if (this.config.wpp_groups_str) {
                    let grps = this.config.wpp_groups_str.split(',').map(s => s.trim()).filter(Boolean);
                    wpp_destinations.push(...grps.map(g => 'group:' + g));
                }
                body.wpp_destinations = wpp_destinations;
                delete body.wpp_channels_str;
                delete body.wpp_groups_str;

                const res = await this.fetchApi('/client/config', 'PUT', body);
                if (res) this.showToast('Configurações salvas!', 'success');
                this.loading = false;
            },

            async fetchApi(endpoint, method = 'GET', body = null) {
                try {
                    const headers = { 
                        'Authorization': `Bearer ${localStorage.getItem('client_token')}`,
                        'Content-Type': 'application/json'
                    };
                    const options = { method, headers };
                    if (body) options.body = JSON.stringify(body);

                    const r = await fetch(`${this.apiBase}${endpoint}`, options);
                    if (r.status === 401) { this.logout(); return null; }
                    
                    let d;
                    const contentType = r.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        d = await r.json();
                    } else {
                        d = await r.text();
                    }

                    return d;
                } catch (e) {
                    this.showToast('Erro: ' + e.message, 'error');
                    return null;
                }
            },

            logout() {
                localStorage.removeItem('client_token');
                this.loggedIn = false;
                this.license = null;
                this.logs = [];
            },

            showToast(msg, type = 'success') {
                this.toast = { show: true, msg, type };
                setTimeout(() => this.toast.show = false, 3000);
            },

            formatLevel(level) {
                const labels = {
                    success: 'SUCCESS',
                    error: 'ERROR',
                    warning: 'WARNING',
                    info: 'INFO'
                };
                return labels[level] || String(level || 'INFO').toUpperCase();
            },

            logLevelClass(level) {
                const classes = {
                    success: 'text-emerald-400',
                    error: 'text-rose-400',
                    warning: 'text-amber-400',
                    info: 'text-indigo-400'
                };
                return classes[level] || classes.info;
            },

            fmtDate(d) {
                if (!d) return '';
                const date = new Date(d);
                if (Number.isNaN(date.getTime())) return '';
                return date.toLocaleDateString();
            },

            fmtRelative(d) {
                if (!d) return '';
                const date = new Date(d);
                if (Number.isNaN(date.getTime())) return '';
                const diffSeconds = Math.floor((Date.now() - date.getTime()) / 1000);
                if (diffSeconds < 60) return 'Agora';
                const diffMinutes = Math.floor(diffSeconds / 60);
                if (diffMinutes < 60) return `${diffMinutes} min atras`;
                const diffHours = Math.floor(diffMinutes / 60);
                if (diffHours < 24) return `${diffHours}h atras`;
                return this.fmtDate(d);
            },

            fmtTime(ts) {
                const date = new Date(ts);
                if (Number.isNaN(date.getTime())) return '';
                return date.toLocaleString();
            }
        }
    }
</script>
</body>
</html>
