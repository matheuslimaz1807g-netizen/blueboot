# =============================================================================
# BlueBot — Cliente: ${CLIENTE_SLUG}
# =============================================================================
# Gerado por: scripts/novo-cliente.sh
# Rede: bluebot_network (compartilhada com a infra central)
# =============================================================================

services:

  whatsapp_${CLIENTE_SLUG}:
    build:
      context: /opt/bluebot
      dockerfile: Dockerfile.whatsapp
    image: bluebot_whatsapp:latest
    container_name: whatsapp_${CLIENTE_SLUG}
    restart: unless-stopped
    env_file: .env
    environment:
      CLIENTE_SLUG: ${CLIENTE_SLUG}
      WHATSAPP_PORT: "4000"
    expose:
      - "4000"
    volumes:
      - whatsapp_auth_${CLIENTE_SLUG}:/.wwebjs_auth
      - whatsapp_cache_${CLIENTE_SLUG}:/.wwebjs_cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true
    shm_size: "256m"

  bot_${CLIENTE_SLUG}:
    build:
      context: /opt/bluebot
      dockerfile: Dockerfile.bot
    image: bluebot_bot:latest
    container_name: bot_${CLIENTE_SLUG}
    restart: unless-stopped
    env_file: .env
    environment:
      CLIENTE_SLUG: ${CLIENTE_SLUG}
      APRO_API_BASE: "http://bluebot_api:8000"
      WHATSAPP_ENDPOINT: "http://whatsapp_${CLIENTE_SLUG}:4000"
      DOCKER_CONTAINER: "1"
    expose:
      - "8080"
    volumes:
      - bot_sessions_${CLIENTE_SLUG}:/app/sessions
      - bot_data_${CLIENTE_SLUG}:/app/data
    depends_on:
      whatsapp_${CLIENTE_SLUG}:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

volumes:
  whatsapp_auth_${CLIENTE_SLUG}:
    driver: local
  whatsapp_cache_${CLIENTE_SLUG}:
    driver: local
  bot_sessions_${CLIENTE_SLUG}:
    driver: local
  bot_data_${CLIENTE_SLUG}:
    driver: local

networks:
  bluebot_network:
    external: true
