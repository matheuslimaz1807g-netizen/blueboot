# =============================================================================
# BlueBot — CAMADA CORE (sobe 1 vez por VPS, nunca muda por cliente)
# Serviços: postgres, api, nginx, certbot
#
# Antes de subir:
#   1. Copie .env.example → .env e preencha TODAS as variáveis
#   2. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — banco central compartilhado
  # NÃO exposto ao host: só acessível dentro de bluebot_network
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: bluebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # expose torna a porta acessível APENAS à rede Docker interna
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # FastAPI — API central de licenças e configurações
  # Build feito a partir de /opt/bluebot/api (ajuste o context se necessário)
  # NÃO exposta ao host: apenas nginx acessa via rede interna
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: bluebot_api:latest
    container_name: bluebot_api
    restart: unless-stopped
    env_file: .env
    environment:
      # DATABASE_URL montada dinamicamente para não expor senha no compose
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # admin montado read-only para servir o painel estático
      - ../admin:/app/admin:ro
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Nginx — proxy reverso + SSL termination
  # Único serviço exposto ao host (80 + 443)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: bluebot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
      - ../admin:/usr/share/nginx/html/admin:ro
      - ../client_app:/usr/share/nginx/html/client:ro
      # Certificados gerados pelo certbot (volume nomeado compartilhado)
      - certbot_data:/etc/letsencrypt:ro
      # Pasta de desafio ACME usada pelo certbot para renovação HTTP-01
      - certbot_www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Certbot — renovação automática de certificados Let's Encrypt
  # Loop a cada 12h; o nginx faz reload via shared volume
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: bluebot_certbot
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Roda certbot renew a cada 12h e sai limpo com SIGTERM
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --webroot -w /var/www/certbot --quiet;
                    sleep 12h & wait $${!};
                  done"
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

# =============================================================================
# Volumes nomeados — persistência de dados críticos
# =============================================================================
volumes:
  postgres_data:
    driver: local
  # certbot_data e certbot_www são compartilhados com o nginx via bind implícito
  certbot_data:
    driver: local
  certbot_www:
    driver: local

# =============================================================================
# Redes — "bluebot_network" fixa (já criada manualmente uma vez)
# Demais containers (clientes) conectam-se com:
#   docker network connect bluebot_network <container>
# =============================================================================
networks:
  bluebot_network:
    external: true
    name: bluebot_network
