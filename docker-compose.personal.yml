services:

  # ── Bot Python (Telegram + Afiliados) ─────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: bluebot_bot
    restart: unless-stopped
    env_file: .env.personal
    ports:
      - "8080:8080"
    volumes:
      - bot_sessions:/app/sessions
    depends_on:
      - whatsapp
      - chrome

  # ── Navegador Remoto com Tela (VNC) para Mercado Livre ─────────────────────
  chrome:
    image: selenium/standalone-chromium-debug:4.11.0
    container_name: bluebot_chrome
    ports:
      - "4444:4444" # Porta do Selenium
      - "7900:7900" # Porta da Interface Web (NoVNC)
    volumes:
      - chrome_profile:/home/seluser/.config/chromium
    shm_size: 2gb
    restart: unless-stopped

  # ── WhatsApp Bridge (Node.js) ──────────────────────────────────────────────
  whatsapp:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    container_name: bluebot_whatsapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"  # Só acessível internamente, não exposto à internet
    volumes:
      - whatsapp_auth:/.wwebjs_auth
      - whatsapp_cache:/.wwebjs_cache

volumes:
  bot_sessions:
  whatsapp_auth:
  whatsapp_cache:
  chrome_profile:
