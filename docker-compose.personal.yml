services:
  # ── Banco de Dados (PostgreSQL) ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bluebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bluebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bluebot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bluebot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bluebot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API de Licenças (FastAPI) ──────────────────────────────────────────────
  license_api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bluebot_license_api
    restart: unless-stopped
    env_file: .env.personal
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://bluebot:bluebot_secret@postgres:5432/bluebot
      - POSTGRES_USER=bluebot
      - POSTGRES_PASSWORD=bluebot_secret
      - POSTGRES_DB=bluebot
    volumes:
      - ./admin:/app/admin:ro
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  # ── Bot Python (Telegram + Afiliados) ─────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: bluebot_bot
    restart: unless-stopped
    env_file: .env.personal
    environment:
      - APRO_API_BASE=http://license_api:8000
      - DOCKER_CONTAINER=1
    ports:
      - "8080:8080"
    volumes:
      - bot_sessions:/app/sessions
      - bot_data:/app/data
      - /root/.config/BraveSoftware/Brave-Browser:/app/brave_profile
    depends_on:
      license_api:
        condition: service_healthy
      whatsapp:
        condition: service_started

  # ── WhatsApp Bridge (Node.js) ──────────────────────────────────────────────
  whatsapp:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    container_name: bluebot_whatsapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - whatsapp_auth:/.wwebjs_auth
      - whatsapp_cache:/.wwebjs_cache

volumes:
  bot_sessions:
  bot_data:
  whatsapp_auth:
  whatsapp_cache:
  postgres_data:
  caddy_data:
  caddy_config:
