# =============================================================================
# BlueBot — Infraestrutura Central
# =============================================================================
# Serviços: postgres, api, nginx, certbot
#
# Antes de subir:
#   1. Crie a rede:  docker network create bluebot_network
#   2. Copie .env.example → .env e preencha
#   3. docker compose up -d
# =============================================================================

services:

  # ─── PostgreSQL 16 ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bluebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

  # ─── FastAPI — API Central ─────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: bluebot_api:latest
    container_name: bluebot_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./admin:/app/admin:ro
      - ./client_app:/app/client_app:ro
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

  # ─── Nginx — Proxy Reverso + SSL Termination ──────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: bluebot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./admin:/usr/share/nginx/html/admin:ro
      - ./client_app:/usr/share/nginx/html/client:ro
      - ./data/ssl:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

  # ─── Certbot — Renovação Automática SSL ────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: bluebot_certbot
    restart: unless-stopped
    volumes:
      - ./data/ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --webroot -w /var/www/certbot --quiet;
                    sleep 12h & wait $${!};
                  done"
    networks:
      - bluebot_network
    security_opt:
      - no-new-privileges:true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# Rede — externa para permitir que clientes se conectem
# Criar com: docker network create bluebot_network
# =============================================================================
networks:
  bluebot_network:
    external: true
