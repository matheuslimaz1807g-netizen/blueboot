services:
  whatsapp_matheus:
    build:
      context: /usr/blueboot
      dockerfile: Dockerfile.whatsapp
    image: blueboot-whatsapp
    container_name: whatsapp_matheus
    restart: unless-stopped
    env_file: .env
    expose:
      - "4000"
    volumes:
      - whatsapp_auth_matheus:/.wwebjs_auth
      - whatsapp_cache_matheus:/.wwebjs_cache
    networks:
      - blueboot_bluebot_network
    security_opt:
      - no-new-privileges:true
    shm_size: "256m"

  bot_matheus:
    build:
      context: /usr/blueboot
      dockerfile: Dockerfile.bot
    image: blueboot-bot
    container_name: bot_matheus
    restart: unless-stopped
    env_file: .env
    environment:
      CLIENTE_SLUG: matheus
      APRO_API_BASE: "http://bluebot_api:8000"
      WHATSAPP_ENDPOINT: "http://whatsapp_matheus:4000"
      DOCKER_CONTAINER: "1"
    volumes:
      - bot_sessions_matheus:/app/sessions
      - bot_data_matheus:/app/data
    depends_on:
      - whatsapp_matheus
    networks:
      - blueboot_bluebot_network
    security_opt:
      - no-new-privileges:true

volumes:
  whatsapp_auth_matheus:
  whatsapp_cache_matheus:
  bot_sessions_matheus:
  bot_data_matheus:

networks:
  blueboot_bluebot_network:
    external: true
