version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bluebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bluebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-S3cur3P@ss!2026#BlueBot}
      POSTGRES_DB: ${POSTGRES_DB:-bluebot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - bluebot_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bluebot_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://bluebot:S3cur3P%40ss%212026%23BlueBot@postgres:5432/bluebot"
    depends_on:
      - postgres
    expose:
      - "8000"
    networks:
      - bluebot_network

  panel:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bluebot_panel
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - bluebot_network

  nginx:
    image: nginx:latest
    container_name: bluebot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - bluebot_network
    depends_on:
      - api
      - panel

  certbot:
    image: certbot/certbot:latest
    container_name: bluebot_certbot
    volumes:
      - ./ssl/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "certbot certonly --webroot
      --webroot-path=/var/www/certbot
      --email suporte@bluebotapp.com.br
      --agree-tos
      --no-eff-email
      -d api.bluebotapp.com.br
      -d app.bluebotapp.com.br"

volumes:
  postgres_data:

networks:
  bluebot_network:
    driver: bridge