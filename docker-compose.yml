services:
  postgres:
    image: postgres:16-alpine
    container_name: bluebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bluebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bluebot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bluebot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Porta 5432 NÃO exposta externamente — apenas rede interna
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bluebot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bluebot_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bluebot}:${POSTGRES_PASSWORD:-bluebot_secret}@postgres:5432/${POSTGRES_DB:-bluebot}
    # Porta 8000 NÃO exposta externamente — apenas nginx acessa
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    container_name: bluebot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./admin:/usr/share/nginx/html/admin:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
