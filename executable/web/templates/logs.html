{% extends "base.html" %}
{% set active_page = "logs" %}

{% block title %}Logs — Apenas Promo{% endblock %}

{% block content %}
<div class="flex-1 overflow-y-auto flex flex-col">
  <header class="sticky top-0 z-10 bg-card/80 backdrop-blur border-b border-border px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <h2 class="text-lg font-semibold text-white">Logs</h2>
      <span class="text-xs text-muted">atualiza a cada 3s</span>
    </div>
    <div class="flex items-center gap-3">
      <!-- Filters -->
      <div class="flex gap-2">
        <label class="filter-chip active" data-filter="info">
          <input type="checkbox" checked class="hidden" onchange="toggleFilter('info', this)"/> INFO
        </label>
        <label class="filter-chip success active" data-filter="success">
          <input type="checkbox" checked class="hidden" onchange="toggleFilter('success', this)"/> SUCESSO
        </label>
        <label class="filter-chip error active" data-filter="error">
          <input type="checkbox" checked class="hidden" onchange="toggleFilter('error', this)"/> ERRO
        </label>
      </div>
      <button onclick="clearLogs()"
              class="text-xs text-muted hover:text-red-400 transition px-3 py-1.5 border border-border rounded-lg">
        Limpar
      </button>
    </div>
  </header>

  <!-- Logs table -->
  <div class="flex-1 overflow-y-auto">
    <table class="w-full text-sm">
      <thead class="sticky top-0 bg-card">
        <tr class="border-b border-border">
          <th class="px-6 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider w-24">Horário</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider w-24">Tipo</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider">Mensagem</th>
        </tr>
      </thead>
      <tbody id="logs-tbody">
        <tr id="empty-row">
          <td colspan="3" class="px-6 py-12 text-center text-muted">Nenhum log disponível.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Footer counter -->
  <div class="border-t border-border px-8 py-2 text-xs text-muted flex items-center justify-between bg-card">
    <span id="log-count">0 entradas</span>
    <span>Máximo 200 entradas exibidas</span>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  let _activeFilters = new Set(['info', 'success', 'error']);
  let _allLogs = [];

  function toggleFilter(type, checkbox) {
    const chip = checkbox.closest('label');
    if (checkbox.checked) {
      _activeFilters.add(type);
      chip.classList.add('active');
    } else {
      _activeFilters.delete(type);
      chip.classList.remove('active');
    }
    renderLogs();
  }

  function renderLogs() {
    const tbody = document.getElementById('logs-tbody');
    const filtered = _allLogs.filter(l => _activeFilters.has(l.nivel));
    const shown = filtered.slice(-200).reverse();

    document.getElementById('log-count').textContent = `${shown.length} entradas`;

    if (shown.length === 0) {
      tbody.innerHTML = '<tr id="empty-row"><td colspan="3" class="px-6 py-12 text-center text-muted">Nenhum log disponível.</td></tr>';
      return;
    }

    tbody.innerHTML = shown.map(l => `
      <tr class="border-b border-border/50 hover:bg-card/60 transition-colors">
        <td class="px-6 py-3 font-mono text-slate-400 text-xs whitespace-nowrap">${l.horario}</td>
        <td class="px-4 py-3">
          <span class="log-badge log-${l.nivel}">${l.nivel === 'success' ? 'SUCESSO' : l.nivel.toUpperCase()}</span>
        </td>
        <td class="px-4 py-3 text-slate-300 break-all">${escHtml(l.mensagem)}</td>
      </tr>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function fetchLogs() {
    try {
      const res = await fetch('/api/logs');
      _allLogs = await res.json();
      renderLogs();
    } catch (e) {}
  }

  async function clearLogs() {
    await fetch('/api/logs/clear', { method: 'POST' });
    _allLogs = [];
    renderLogs();
  }

  fetchLogs();
  setInterval(fetchLogs, 3000);
</script>
{% endblock %}
