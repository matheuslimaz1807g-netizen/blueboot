events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_max_body_size 10m;
    sendfile on;
    keepalive_timeout 65;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin_zone:5m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=client_zone:10m rate=20r/s;

    # DNS resolver Docker
    resolver 127.0.0.11 valid=30s ipv6=off;

    # =========================================================================
    # BLOCO 1 — HTTP DEFAULT (bloquear acesso por IP)
    # =========================================================================
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # =========================================================================
    # BLOCO 2 — HTTP para todos os domínios (ACME + conteúdo)
    # =========================================================================
    server {
        listen 80;
        server_name bluebotapp.com.br www.bluebotapp.com.br console.bluebotapp.com.br api.bluebotapp.com.br app.bluebotapp.com.br;

        # Desafio ACME do Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Painel Admin (console)
        location / {
            try_files $uri $uri/ /index.html;
            root /usr/share/nginx/html/admin;
            index index.html;
        }

        # API Admin
        location /admin/ {
            limit_req zone=admin_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Proxy
        location /client/ {
            limit_req zone=client_zone burst=50 nodelay;
            limit_req_status 429;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://api:8000;
            access_log off;
        }
    }
}
