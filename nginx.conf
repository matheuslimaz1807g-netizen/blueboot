# =============================================================================
# nginx.conf — BlueBot Multi-Tenant
#
# Rotas:
#   admin.bluebotapp.com.br   → Painel admin (static files + basic auth)
#   api.bluebotapp.com.br     → FastAPI (rate limiting)
#   *.bluebotapp.com.br       → Dashboards de clientes (proxy para bot)
#
# Segurança:
#   - Acesso por IP direto bloqueado (retorna 444)
#   - HTTPS obrigatório (redirect 301 de HTTP)
#   - Headers de segurança em todas as rotas
#   - Rate limiting via limit_req_zone
#   - Basic auth no painel admin
#
# ⚠️  AJUSTE MANUAL NECESSÁRIO:
#   1. Crie o arquivo de senha do basic auth ANTES de subir o nginx:
#      apt install apache2-utils -y
#      htpasswd -c /etc/nginx/conf.d/.htpasswd admin
#      (monte o arquivo no container nginx via volume)
#
#   2. Certificados SSL:
#      Para obter o certificado real com certbot, rode PRIMEIRO com a seção
#      HTTP apenas (sem HTTPS) para que o desafio ACME funcione.
#      Depois adicione os blocos SSL.
# =============================================================================

# Tamanho máximo de upload (útil para QR codes e imagens)
client_max_body_size 10m;

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logs — sem expor tokens ou credenciais
    # O formato exclui o corpo da requisição (onde tokens poderiam aparecer)
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # Rate Limiting — zona compartilhada para a API
    # 10mb de zona = ~160.000 endereços IPs
    # -------------------------------------------------------------------------
    # Zona para a API: 30 req/s por IP (burst de 60 com delay)
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    # Zona para o painel admin: 5 req/s (mais restrito)
    limit_req_zone $binary_remote_addr zone=admin_zone:5m rate=5r/s;
    # Zona para dashboards de clientes: 20 req/s
    limit_req_zone $binary_remote_addr zone=client_zone:10m rate=20r/s;

    # -------------------------------------------------------------------------
    # SSL — configurações compartilhadas por todos os blocos server HTTPS
    # -------------------------------------------------------------------------
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    # Ciphers modernos e seguros (compatível com A+ no SSL Labs)
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling (acelera handshake SSL)
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Resolver DNS do Docker para hostname dinâmico de clientes
    resolver 127.0.0.11 valid=30s ipv6=off;

    # -------------------------------------------------------------------------
    # Headers de segurança — aplicados globalmente
    # -------------------------------------------------------------------------
    add_header X-Frame-Options            "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options     "nosniff"                                 always;
    add_header X-XSS-Protection           "1; mode=block"                           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"         always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    # HSTS: força HTTPS por 1 ano em todos subdomínios
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    # CSP: restringe origens para reduzir XSS
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.bluebotapp.com.br; frame-ancestors 'none';" always;

    # =========================================================================
    # BLOCO 1 — Bloquear acesso direto por IP
    # Qualquer requisição que não bata em um server_name configurado cai aqui.
    # Retorna 444 (fecha a conexão sem resposta) para dificultar scanning.
    # =========================================================================
    server {
        listen 80  default_server;
        listen 443 ssl default_server;
        server_name _;

        # Certificado self-signed para o default_server (evita erro de SSL)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # 444 fecha a conexão TCP imediatamente, sem enviar nenhuma resposta
        return 444;
    }

    # =========================================================================
    # BLOCO 2 — HTTP → HTTPS (redirect global para todos os domínios)
    # =========================================================================
    server {
        listen 80;
        server_name bluebotapp.com.br
                    www.bluebotapp.com.br
                    admin.bluebotapp.com.br
                    api.bluebotapp.com.br
                    ~^(?<slug>[a-z0-9-]+)\.bluebotapp\.com\.br$;

        # Permite que o certbot complete o desafio ACME via HTTP antes do SSL
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # BLOCO 3 — admin.bluebotapp.com.br
    # Serve os arquivos estáticos do painel admin com basic auth.
    # ⚠️  Crie o .htpasswd antes de subir (ver comentário no topo do arquivo)
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name admin.bluebotapp.com.br;

        ssl_certificate     /etc/letsencrypt/live/bluebotapp.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bluebotapp.com.br/privkey.pem;

        # Autenticação básica — protege o painel admin de acesso não autorizado
        # O arquivo .htpasswd deve ser montado via volume no docker-compose do core
        auth_basic           "BlueBot Admin";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

        # Rate limit mais restritivo no admin
        limit_req zone=admin_zone burst=20 nodelay;
        limit_req_status 429;

        root  /usr/share/nginx/html/admin;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Bloquear acesso a arquivos sensíveis (.env, .git, etc.)
        location ~ /\.(env|git|htpasswd) {
            deny all;
            return 404;
        }
    }

    # =========================================================================
    # BLOCO 4 — api.bluebotapp.com.br
    # Proxy para o FastAPI com rate limiting.
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name api.bluebotapp.com.br;

        ssl_certificate     /etc/letsencrypt/live/bluebotapp.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bluebotapp.com.br/privkey.pem;

        # Rate limiting: 30 req/s com burst de 60
        limit_req zone=api_zone burst=60 delay=30;
        limit_req_status 429;

        location / {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            # Desabilita buffering para respostas de streaming (SSE, WebSocket)
            proxy_buffering    off;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Retorna 429 em JSON (mais amigável para clientes de API)
        error_page 429 @rate_limit_json;
        location @rate_limit_json {
            default_type application/json;
            return 429 '{"detail":"Muitas requisições. Aguarde e tente novamente."}';
        }
    }

    # =========================================================================
    # BLOCO 5 — *.bluebotapp.com.br (dashboards de clientes)
    # Captura qualquer subdomínio não listado acima e faz proxy para o bot
    # do cliente correspondente.
    #
    # O hostname do container bot é: bot_<slug>:8080 (na rede bluebot_network)
    # O nginx resolve o DNS dinamicamente via resolver 127.0.0.11
    # =========================================================================
    server {
        listen 443 ssl http2;
        # Regex captura o slug do subdomínio: "empresa-abc.bluebotapp.com.br" → slug=empresa-abc
        server_name ~^(?<slug>[a-z0-9-]+)\.bluebotapp\.com\.br$;

        ssl_certificate     /etc/letsencrypt/live/bluebotapp.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bluebotapp.com.br/privkey.pem;

        limit_req zone=client_zone burst=40 delay=20;
        limit_req_status 429;

        location / {
            # bot_<slug> é o container name definido no docker-compose do cliente
            # A variável $slug vem da captura regex do server_name
            set $upstream "http://bot_${slug}:8080";
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            # X-Client-Slug permite que o bot saiba qual cliente está sendo servido
            proxy_set_header   X-Client-Slug     $slug;
            proxy_read_timeout 60s;
        }

        # Fallback: se o container do cliente não existir, retorna 503 amigável
        error_page 502 503 504 @client_unavailable;
        location @client_unavailable {
            default_type text/html;
            return 503 '<html><body><h2>Serviço temporariamente indisponível</h2><p>O painel deste cliente está sendo iniciado. Tente novamente em alguns minutos.</p></body></html>';
        }
    }
}
