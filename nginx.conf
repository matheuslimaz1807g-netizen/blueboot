http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Segurança - Headers HTTP
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Configurações SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-G5-SHA384:ECDHE-RSA-AES128-G5-SHA256;
    ssl_prefer_server_ciphers off;

    # Resolver DNS Docker
    resolver 127.0.0.11 valid=30s;

    # Redirecionar HTTP para HTTPS
    server {
        listen 80;
        server_name bluebotapp.com.br www.bluebotapp.com.br api.bluebotapp.com.br painel.bluebotapp.com.br;
        
        # Redirecionamento para HTTPS
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # Servidor HTTPS Principal
    server {
        listen 443 ssl http2;
        server_name bluebotapp.com.br www.bluebotapp.com.br;

        # Certificados SSL (serão gerados pelo Certbot)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Painel Admin e Portal
        location /panel/ {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ $uri.html /panel/index.html;
        }

        # API
        location /admin/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        # Painel Bot
        location /bot/ {
            proxy_pass http://bot:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        # API pública
        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }
    }

    # Subdomínio API
    server {
        listen 443 ssl http2;
        server_name api.bluebotapp.com.br;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }
    }

    # Subdomínio Painel
    server {
        listen 443 ssl http2;
        server_name painel.bluebotapp.com.br;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        location / {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ $uri.html /panel/index.html;
        }
    }
}
