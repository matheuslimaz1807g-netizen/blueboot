events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    # 30 requests per second per IP for the API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # 30 requests per minute per IP for admin routes
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=30r/m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    upstream api_backend {
        server 127.0.0.1:8000;
    }

    # ── HTTP Server ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Admin API routes (proxy to backend) ──────────────────────────────
        location ~ ^/admin/(login|licenses|versions|seed|health) {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Admin panel — proxy para a API (que serve /panel) ────────────────
        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            rewrite ^/admin/(.*) /panel/$1 break;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── License/Config API — rate limited ─────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
