events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # DNS interno do Docker para resolução dinâmica
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name _;

        # Variável para evitar que o Nginx morra se a API não estiver pronta no boot
        set $backend "http://api:8000";

        # Painel Administrativo e API
        location /admin/ {
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        # Painel do Bot (Porta 8080 interna)
        location /bot/ {
            proxy_pass http://bot:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        # Redirecionamento amigável para /admin/
        location = /admin {
            return 301 /admin/;
        }

        # Endpoints de Licença e Configuração (Raiz)
        location / {
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }
    }
}
