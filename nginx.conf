user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_max_body_size 10m;
    sendfile on;
    keepalive_timeout 65;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # =====================================================================
    # COMPLETAMENTE DESATIVADO IPv6
    # =====================================================================
    # Não adicionar nenhum "listen [::]" → evita CERT COMMON NAME INVALID no IPv6
    # Hostinger tem IPv6, mas Let’s Encrypt não validou → remover!
    # =====================================================================

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin_zone:5m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=client_zone:10m rate=20r/s;

    # SSL global
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_certificate     /etc/letsencrypt/live/bluebotapp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bluebotapp.com.br/privkey.pem;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Security Headers
    add_header X-Frame-Options           "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # =====================================================================
    # BLOCO 1 — Bloquear acesso direto ao IP (SOMENTE HTTP)
    # =====================================================================
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # =====================================================================
    # BLOCO 2 — HTTP → HTTPS + Certbot
    # =====================================================================
    server {
        listen 80;
        server_name bluebotapp.com.br
                    www.bluebotapp.com.br
                    console.bluebotapp.com.br
                    api.bluebotapp.com.br
                    app.bluebotapp.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =====================================================================
    # BLOCO 3 — console.bluebotapp.com.br (Painel Admin)
    # =====================================================================
    server {
        listen 443 ssl http2;
        server_name console.bluebotapp.com.br;

        limit_req zone=admin_zone burst=20 nodelay;
        limit_req_status 429;

        root /usr/share/nginx/html/admin;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /admin/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ /\.(env|git|htpasswd) {
            deny all;
            return 404;
        }
    }

    # =====================================================================
    # BLOCO 4 — api.bluebotapp.com.br (FastAPI)
    # =====================================================================
    server {
        listen 443 ssl http2;
        server_name api.bluebotapp.com.br;

        limit_req zone=api_zone burst=60 delay=30;
        limit_req_status 429;

        location / {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        error_page 429 @rate_limit;
        location @rate_limit {
            default_type application/json;
            return 429 '{"detail":"Muitas requisições. Tente novamente."}';
        }
    }

    # =====================================================================
    # BLOCO 5 — bluebotapp.com.br e www → redireciona para admin
    # =====================================================================
    server {
        listen 443 ssl http2;
        server_name bluebotapp.com.br www.bluebotapp.com.br;

        return 301 https://console.bluebotapp.com.br$request_uri;
    }

    # =====================================================================
    # BLOCO 6 — app.bluebotapp.com.br (Painel do Cliente)
    # =====================================================================
    server {
        listen 443 ssl http2;
        server_name app.bluebotapp.com.br;

        limit_req zone=client_zone burst=40 delay=20;
        limit_req_status 429;

        root /usr/share/nginx/html/client;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # API routes - proxy to FastAPI
        location /api/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        error_page 502 503 504 @unavailable;

        location @unavailable {
            default_type text/html;
            return 503 '<html><body><h2>Serviço temporariamente indisponível</h2><p>Tente novamente em instantes.</p></body></html>';
        }
    }
}