events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_max_body_size 10m;
    sendfile on;
    keepalive_timeout 65;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin_zone:5m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=client_zone:10m rate=20r/s;

    # SSL global
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Certificado padrão herdado por todos os server blocks HTTPS
    # Durante bootstrap: self-signed. Após certbot: Let's Encrypt real.
    ssl_certificate     /etc/letsencrypt/live/bluebotapp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bluebotapp.com.br/privkey.pem;

    # DNS resolver Docker (para proxy dinâmico de clientes)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Security headers globais
    add_header X-Frame-Options           "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # =========================================================================
    # BLOCO 1 — Bloquear acesso direto por IP (sem server_name configurado)
    # =========================================================================
    server {
        listen 80  default_server;
        listen 443 ssl default_server;
        server_name _;
        return 444;
    }

    # =========================================================================
    # BLOCO 2 — HTTP → HTTPS (redirect global + desafio ACME do Certbot)
    # =========================================================================
    server {
        listen 80;
        server_name bluebotapp.com.br
                    www.bluebotapp.com.br
                    admin.bluebotapp.com.br
                    api.bluebotapp.com.br
                    ~^(?<slug>[a-z0-9-]+)\.bluebotapp\.com\.br$;

        # Permite que o certbot complete o desafio ACME via HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # BLOCO 3 — admin.bluebotapp.com.br (painel admin + basic auth)
    # ⚠️ Crie o .htpasswd antes: htpasswd -c /usr/blueboot/core/.htpasswd admin
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.bluebotapp.com.br;

        auth_basic           "BlueBot Admin";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

        limit_req zone=admin_zone burst=20 nodelay;
        limit_req_status 429;

        root  /usr/share/nginx/html/admin;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~ /\.(env|git|htpasswd) {
            deny all;
            return 404;
        }
    }

    # =========================================================================
    # BLOCO 4 — api.bluebotapp.com.br (FastAPI com rate limiting)
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.bluebotapp.com.br;

        limit_req zone=api_zone burst=60 delay=30;
        limit_req_status 429;

        location / {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 60s;
        }

        error_page 429 @rate_limit_json;
        location @rate_limit_json {
            default_type application/json;
            return 429 '{"detail":"Muitas requisicoes. Tente novamente em instantes."}';
        }
    }

    # =========================================================================
    # BLOCO 5 — bluebotapp.com.br / www (redireciona para o painel admin)
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name bluebotapp.com.br www.bluebotapp.com.br;

        return 301 https://admin.bluebotapp.com.br$request_uri;
    }

    # =========================================================================
    # BLOCO 6 — *.bluebotapp.com.br (dashboards de clientes)
    # Captura slug do subdomínio e faz proxy para bot_<slug>:8080
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name ~^(?<slug>[a-z0-9-]+)\.bluebotapp\.com\.br$;

        limit_req zone=client_zone burst=40 delay=20;
        limit_req_status 429;

        location / {
            set $upstream "http://bot_${slug}:8080";
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Client-Slug     $slug;
            proxy_read_timeout 60s;
        }

        error_page 502 503 504 @client_unavailable;
        location @client_unavailable {
            default_type text/html;
            return 503 '<html><body><h2>Servico temporariamente indisponivel</h2><p>Tente novamente em instantes.</p></body></html>';
        }
    }
}
