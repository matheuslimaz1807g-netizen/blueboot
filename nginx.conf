events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    # 30 requests per second per IP for the API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # 30 requests per minute per IP for admin routes
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=30r/m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    upstream api_backend {
        server license_api:8000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # SSL certificates (generate with certbot or self-signed for testing)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS (uncomment after HTTPS is confirmed working)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Admin API routes (proxy to backend) ──────────────────────────────
        location ~ ^/admin/(login|licenses|versions|seed|health) {
            auth_basic "Area Administrativa";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Admin panel (static files) — only for known file extensions ──────
        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            auth_basic "Area Administrativa";
            auth_basic_user_file /etc/nginx/.htpasswd;

            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
            # No rate limit for static files
        }

        # ── License/Config API — rate limited ─────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
