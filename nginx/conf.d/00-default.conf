# =============================================================================
# Default Server — Bloquear acesso direto por IP
# Prefixo 00- garante que este é processado primeiro
# =============================================================================

server {
    listen 80  default_server;
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    include /etc/nginx/snippets/ssl.conf;

    # Fechar conexão silenciosamente
    return 444;
}
