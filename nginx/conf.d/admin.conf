# =============================================================================
# console.bluebotapp.com.br — Painel Admin (SPA estática + API proxy)
# =============================================================================

server {
    listen 443 ssl;
    http2 on;
    server_name console.bluebotapp.com.br;

    include /etc/nginx/snippets/ssl.conf;

    limit_req zone=admin burst=20 nodelay;
    limit_req_status 429;

    root  /usr/share/nginx/html/admin;
    index index.html;

    # API routes — proxy para FastAPI
    location /admin/ {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/proxy.conf;
    }

    location /auth/ {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/proxy.conf;
    }

    location /health {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/proxy.conf;
    }

    # Painel estático (SPA fallback)
    location /panel/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /index.html;
    }

    # SPA fallback para tudo que não é API
    location / {
        try_files $uri $uri/ /index.html;
    }
}
