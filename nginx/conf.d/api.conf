# =============================================================================
# api.bluebotapp.com.br — FastAPI (proxy reverso)
# =============================================================================

server {
    listen 443 ssl;
    http2 on;
    server_name api.bluebotapp.com.br;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/cors.conf;

    limit_req zone=api burst=60 delay=30;
    limit_req_status 429;

    location / {
        # Preflight CORS
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers     "*";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age           "86400";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://api:8000;
        include /etc/nginx/snippets/proxy.conf;
    }

    error_page 429 @rate_limit;
    location @rate_limit {
        default_type application/json;
        return 429 '{"detail":"Muitas requisicoes. Tente novamente em instantes."}';
    }
}
