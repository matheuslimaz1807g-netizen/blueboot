# =============================================================================
# api.bluebotapp.com.br — FastAPI (proxy reverso)
# CORS é gerenciado pelo FastAPI (CORSMiddleware) — NÃO duplicar aqui
# =============================================================================

server {
    listen 443 ssl;
    http2 on;
    server_name api.bluebotapp.com.br;

    include /etc/nginx/snippets/ssl.conf;

    limit_req zone=api burst=60 delay=30;
    limit_req_status 429;

    location / {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/proxy.conf;
    }

    error_page 429 @rate_limit;
    location @rate_limit {
        default_type application/json;
        return 429 '{"detail":"Muitas requisicoes. Tente novamente em instantes."}';
    }
}
