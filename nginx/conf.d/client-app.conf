# =============================================================================
# app.bluebotapp.com.br — Painel do Cliente (SaaS)
# =============================================================================

server {
    listen 443 ssl;
    http2 on;
    server_name app.bluebotapp.com.br;

    include /etc/nginx/snippets/ssl.conf;

    limit_req zone=client burst=40 delay=20;
    limit_req_status 429;

    # Proxy para API (rotas /client/*, /auth/*, etc.)
    location / {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/proxy.conf;
    }

    # Arquivos estáticos do painel do cliente
    location /app_static/ {
        alias /usr/share/nginx/html/client/;
        try_files $uri $uri/ /index.html;
    }

    error_page 502 503 504 @unavailable;
    location @unavailable {
        default_type text/html;
        return 503 '<html><body><h2>Servico temporariamente indisponivel</h2><p>Tente novamente em instantes.</p></body></html>';
    }
}
