# =============================================================================
# bluebotapp.com.br + www — Redirect para console
# =============================================================================

server {
    listen 443 ssl;
    http2 on;
    server_name bluebotapp.com.br www.bluebotapp.com.br;

    include /etc/nginx/snippets/ssl.conf;

    return 301 https://console.bluebotapp.com.br$request_uri;
}
