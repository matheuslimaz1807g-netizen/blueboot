# =============================================================================
# BlueBot — Nginx Principal
# =============================================================================
# Estrutura modular:
#   snippets/ssl.conf       — Certificados e TLS
#   snippets/proxy.conf     — Headers de proxy
#   snippets/cors.conf      — CORS para API
#   snippets/security.conf  — Headers de segurança
#   conf.d/*.conf            — Server blocks por domínio
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_max_body_size 10m;
    sendfile on;
    keepalive_timeout 65;

    # Logging
    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin:5m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=client:10m rate=20r/s;

    # Security headers globais
    include /etc/nginx/snippets/security.conf;

    # DNS resolver Docker
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─── HTTP → HTTPS (redirect global + ACME challenge) ─────────────────
    server {
        listen 80;
        server_name bluebotapp.com.br
                    www.bluebotapp.com.br
                    console.bluebotapp.com.br
                    api.bluebotapp.com.br
                    app.bluebotapp.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Server blocks HTTPS (carregados de conf.d/) ─────────────────────
    include /etc/nginx/conf.d/*.conf;
}