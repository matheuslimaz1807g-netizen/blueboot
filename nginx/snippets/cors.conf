# =============================================================================
# CORS Headers — Para o bloco api.bluebotapp.com.br
# Include com:  include /etc/nginx/snippets/cors.conf;
# =============================================================================

set $cors_origin "";
if ($http_origin ~* (https://app\.bluebotapp\.com\.br|https://console\.bluebotapp\.com\.br|https://admin\.bluebotapp\.com\.br|https://bluebotapp\.com\.br|https://www\.bluebotapp\.com\.br|http://localhost:8080|http://localhost:3000|http://localhost:5173)) {
    set $cors_origin $http_origin;
}

add_header Access-Control-Allow-Origin      $cors_origin always;
add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
add_header Access-Control-Allow-Headers     "*" always;
add_header Access-Control-Allow-Credentials "true" always;
add_header Access-Control-Max-Age           "86400" always;
