# =============================================================================
# SSL/TLS Configuration — Reutilizável por todos os server blocks HTTPS
# Include com:  include /etc/nginx/snippets/ssl.conf;
# =============================================================================

# Certificados Let's Encrypt
ssl_certificate     /etc/letsencrypt/live/bluebotapp.com.br/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/bluebotapp.com.br/privkey.pem;

# Sessão TLS
ssl_session_cache   shared:SSL:20m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# Protocolos e ciphers (Mozilla Intermediate)
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;

# OCSP Stapling (melhor performance e privacidade)
ssl_stapling on;
ssl_stapling_verify on;
